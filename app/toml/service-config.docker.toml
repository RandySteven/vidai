# Copy to service-config.local.toml and fill in secrets (local file is gitignored).
[host]
server = "localhost"
port = 8000

# --- Aiven for MySQL (TLS required in production) ---
[mysql]
host = "localhost"
port = 3036
user = "root"
password = ""
database = "vidai"
# "required" | "verify_identity" | "disabled" (local dev only)
ssl_mode = "required"
# Optional: path to Aiven project CA (download from Aiven console)
ssl_ca_path = ""
tls_allow_invalid_certificates = true


[redis]
url = ""
host = "localhost"
port = 6379
password = ""
database = 0
ssl = false
# Optional when ssl = true (Aiven CA file path)
ssl_ca_path = ""

[temporal]
address = "localhost:7233"
namespace = "default"
task_queue = "vidai"
workflow_id = "vidai"
workflow_task_queue = "vidai"
workflow_task_queue_type = "sticky"